version: '3.8'

services:
  # 1. Database Layer
  db:
    image: postgres:15-alpine
    container_name: as-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. AI Layer
  ollama:
    image: ollama/ollama
    container_name: as-ollama
    restart: always
    ports:
      - "11439:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 3. Backend Layer
  backend:
    build: ./backend
    image: autosprint-backend
    container_name: as-backend
    restart: always
    ports:
      - "8009:8000"
    depends_on:
      db:
        condition: service_healthy 
      ollama:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_URL=http://ollama:11434/api/generate
      - CORS_ORIGIN=http://localhost:3009
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./backend:/app

  # 4. Frontend Layer
  frontend:
    build: ./frontend
    image: autosprint-frontend
    container_name: as-frontend
    ports:
      - "3009:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data: